<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<h2 class="sr-only">BluParrot Ventures attendance dashboard</h2>
<div id="modal-root"></div>
<div id="config-banner-root"></div>
<div class="shell" id="app"></div>
<div class="saving-indicator hidden" id="saving-indicator"><i class="ti ti-loader" style="animation:spin .7s linear infinite"></i><span id="saving-text">Saving…</span></div>

<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<!-- External libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- Supabase JS v2 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<!-- Your credentials (edit config.js) -->
<script src="config.js"></script>

<script>
// ============================================================
// 1. SUPABASE CLIENT SETUP
// ============================================================
let supabase = null;
let dbOk = false;

function initSupabase() {
  try {
    if (
      typeof SUPABASE_URL === 'undefined' ||
      typeof SUPABASE_ANON_KEY === 'undefined' ||
      SUPABASE_URL.includes('YOUR_PROJECT_ID') ||
      SUPABASE_ANON_KEY.includes('YOUR_ANON')
    ) {
      console.warn('Supabase not configured — edit config.js');
      return false;
    }
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    return true;
  } catch (e) {
    console.error('Supabase init error:', e);
    return false;
  }
}

// ============================================================
// 2. HELPERS / UTILS
// ============================================================
const AVC=[{bg:'#E1F5EE',color:'#085041'},{bg:'#E6F1FB',color:'#0C447C'},{bg:'#FBEAF0',color:'#72243E'},{bg:'#FAEEDA',color:'#633806'},{bg:'#EEEDFE',color:'#3C3489'},{bg:'#FCEBEB',color:'#791F1F'}];
const ac = i => AVC[i % AVC.length];
const ini = n => n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const todayStr = () => new Date().toISOString().slice(0,10);
const fmtDate = d => new Date(d+'T12:00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
const fmtMonth = (y,m) => new Date(y,m,1).toLocaleDateString('en-IN',{month:'long',year:'numeric'});
const nowTime = () => { const n=new Date(); return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`; };
const escHtml = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const sleep = ms => new Promise(r => setTimeout(r, ms));

// ============================================================
// 3. STATE
// ============================================================
const now = new Date();
let state = {
  employees: [],
  records: {},           // { empId: { 'YYYY-MM-DD': {status,clockIn,clockOut} } }
  selectedDate: todayStr(),
  selectedEmp: null,
  view: 'daily',
  page: 'attendance',
  dlOpen: false,
  viewYear: now.getFullYear(),
  viewMonth: now.getMonth(),
  searchQuery: '',
  searchError: false,
  editingEmpId: null,
  confirmDeleteId: null,
  uploadModal: null,
  dbStatus: 'loading',   // 'loading' | 'ok' | 'err' | 'unconfigured'
  isSaving: false,
  saveQueue: [],
};

// ============================================================
// 4. DATABASE LAYER
//    All DB calls go through these functions.
//    Falls back to localStorage when Supabase is not configured.
// ============================================================

/* ── Local fallback ── */
function saveLS() {
  try {
    localStorage.setItem('bp_emp', JSON.stringify(state.employees));
    localStorage.setItem('bp_rec', JSON.stringify(state.records));
  } catch {}
}
function loadLS() {
  try {
    const e = localStorage.getItem('bp_emp');
    const r = localStorage.getItem('bp_rec');
    if (e) { state.employees = JSON.parse(e); state.records = JSON.parse(r || '{}'); }
  } catch {}
}

/* ── Supabase: load all employees ── */
async function dbLoadEmployees() {
  const { data, error } = await supabase
    .from('employees')
    .select('*')
    .order('created_at');
  if (error) throw error;
  return data.map(r => ({ id: r.id, name: r.name, role: r.role, dept: r.dept }));
}

/* ── Supabase: load attendance records for a month ── */
async function dbLoadRecordsForMonth(year, month) {
  const start = new Date(year, month, 1).toISOString().slice(0,10);
  const end   = new Date(year, month+1, 0).toISOString().slice(0,10);
  const { data, error } = await supabase
    .from('attendance_records')
    .select('*')
    .gte('date', start)
    .lte('date', end);
  if (error) throw error;
  // Merge into state.records
  (data || []).forEach(row => {
    if (!state.records[row.emp_id]) state.records[row.emp_id] = {};
    state.records[row.emp_id][row.date] = {
      status: row.status,
      clockIn: row.clock_in,
      clockOut: row.clock_out,
    };
  });
}

/* ── Supabase: upsert one attendance record ── */
async function dbUpsertRecord(empId, date, data) {
  const { error } = await supabase
    .from('attendance_records')
    .upsert({
      emp_id: empId,
      date: date,
      status: data.status ?? null,
      clock_in: data.clockIn ?? null,
      clock_out: data.clockOut ?? null,
      updated_at: new Date().toISOString(),
    }, { onConflict: 'emp_id,date' });
  if (error) throw error;
}

/* ── Supabase: insert employee ── */
async function dbInsertEmployee(emp) {
  const { error } = await supabase
    .from('employees')
    .insert({ id: emp.id, name: emp.name, role: emp.role, dept: emp.dept });
  if (error) throw error;
}

/* ── Supabase: update employee ── */
async function dbUpdateEmployee(emp) {
  const { error } = await supabase
    .from('employees')
    .update({ name: emp.name, role: emp.role, dept: emp.dept })
    .eq('id', emp.id);
  if (error) throw error;
}

/* ── Supabase: delete employee (cascade deletes records) ── */
async function dbDeleteEmployee(id) {
  const { error } = await supabase
    .from('employees')
    .delete()
    .eq('id', id);
  if (error) throw error;
}

/* ── Supabase: bulk upsert employees from CSV ── */
async function dbBulkUpsertEmployees(emps) {
  const { error } = await supabase
    .from('employees')
    .upsert(emps.map(e => ({ id: e.id, name: e.name, role: e.role, dept: e.dept })));
  if (error) throw error;
}

/* ── Supabase: delete all employees ── */
async function dbDeleteAllEmployees() {
  const { error } = await supabase
    .from('employees')
    .delete()
    .neq('id', '');    // delete all rows
  if (error) throw error;
}

// 5. INIT — load data on startup
// ============================================================
async function init() {
  const configured = initSupabase();
  if (!configured) {
    state.dbStatus = 'unconfigured';
    loadLS();
    render();
    return;
  }

  state.dbStatus = 'loading';
  render();

  try {
    state.employees = await dbLoadEmployees();
    await dbLoadRecordsForMonth(state.viewYear, state.viewMonth);
    state.dbStatus = 'ok';
    dbOk = true;
  } catch(e) {
    console.error('DB init error:', e);
    state.dbStatus = 'err';
    loadLS(); // fallback
  }
  render();
}

// ============================================================
// 6. RECORD ACCESSORS (same API as before)
// ============================================================
function getR(id, date) {
  return (state.records[id] || {})[date] || { status: null, clockIn: null, clockOut: null };
}

async function setR(id, date, data) {
  if (!state.records[id]) state.records[id] = {};
  state.records[id][date] = { ...getR(id, date), ...data };

  // Always update local state immediately for snappy UI
  render();

  if (dbOk) {
    showSaving('Saving…');
    try {
      await dbUpsertRecord(id, date, state.records[id][date]);
      showSaving('Saved ✓', 1000);
    } catch(e) {
      console.error('setR error:', e);
      showSaving('Save failed', 2000);
      saveLS(); // fallback
    }
  } else {
    saveLS();
  }
}

// ============================================================
// 7. SAVING INDICATOR
// ============================================================
let savingTimer = null;
function showSaving(msg, autohideMs = 0) {
  const el = document.getElementById('saving-indicator');
  const txt = document.getElementById('saving-text');
  if (!el) return;
  el.classList.remove('hidden');
  txt.textContent = msg;
  if (savingTimer) clearTimeout(savingTimer);
  if (autohideMs) savingTimer = setTimeout(() => el.classList.add('hidden'), autohideMs);
}

// ============================================================
// 8. CALCULATIONS (unchanged from original)
// ============================================================
function dailyHrs(id, date) {
  const r = getR(id, date);
  if (!r.clockIn || !r.clockOut) return 0;
  const [h1,m1] = r.clockIn.split(':').map(Number);
  const [h2,m2] = r.clockOut.split(':').map(Number);
  return Math.max(0, ((h2*60+m2) - (h1*60+m1)) / 60);
}
function monthlyHrs(id, y, m) {
  const base = new Date(y,m,1); let t = 0;
  for (let i = 0; i < 31; i++) {
    const d = new Date(base); d.setDate(i+1);
    if (d.getMonth() !== m) break;
    t += dailyHrs(id, d.toISOString().slice(0,10));
  }
  return t;
}
function mCounts(id, y, m) {
  const base = new Date(y,m,1); let p=0,a=0,w=0,l=0,days=0;
  for (let i = 0; i < 31; i++) {
    const d = new Date(base); d.setDate(i+1);
    if (d.getMonth() !== m || d > new Date()) break;
    if (d.getDay() === 0 || d.getDay() === 6) continue;
    days++;
    const s = getR(id, d.toISOString().slice(0,10)).status;
    if (s==='present') p++; else if (s==='wfh') w++; else if (s==='leave') l++; else if (s==='absent') a++;
  }
  return { present:p, absent:a, wfh:w, leave:l, days };
}

function filteredEmployees() {
  const q = state.searchQuery.trim();
  if (!q) { state.searchError = false; return state.employees; }
  try {
    const rx = new RegExp(q, 'i'); state.searchError = false;
    return state.employees.filter(e => rx.test(e.name) || rx.test(e.role) || rx.test(e.dept));
  } catch { state.searchError = true; return state.employees; }
}
function highlightMatch(text) {
  const q = state.searchQuery.trim();
  if (!q || state.searchError) return escHtml(text);
  try { const rx = new RegExp(`(${q})`, 'gi'); return escHtml(text).replace(rx,'<mark class="highlight">$1</mark>'); }
  catch { return escHtml(text); }
}

  if (!s) return `<span class="badge badge-neutral">—</span>`;

  return m ? `<span class="badge ${m.cls}"><i class="ti ${m.icon}"></i>${m.label}</span>` : `<span class="badge badge-neutral">—</span>`;
}
function hoursBar(h, max=9) {
  const p = Math.min(100, Math.round(h/max*100));
  return `<div class="hours-bar-wrap"><div class="hours-bar"><div class="hours-bar-fill" style="width:${p}%"></div></div><span class="hours-val">${h.toFixed(1)}h</span></div>`;
}
function rowClass(s) { if(s==='absent') return ' row-absent'; if(s==='leave') return ' row-leave'; return ''; }
function monthOptions() {
  const opts = []; const cur = new Date();
  for (let i = 0; i < 12; i++) {

    const y = d.getFullYear(), m = d.getMonth();

    opts.push(`<option value="${y}-${m}" ${sel}>${d.toLocaleDateString('en-IN',{month:'short',year:'numeric'})}</option>`);
  }
  return opts.join('');
}
function dbStatusBadge() {
  const map = {
    ok:           { cls:'ok',      dot:'', label:'Connected' },
    err:          { cls:'err',     dot:'', label:'DB error' },
    loading:      { cls:'loading', dot:'', label:'Connecting…' },

  };
  const s = map[state.dbStatus] || map.loading;
  return `<span class="db-status ${s.cls}"><span class="db-dot"></span>${s.label}</span>`;
}

function cancelEdit() { state.editingEmpId=null; render(); }

async function switchMonth(val) {

  if (dbOk) {

async function saveEdit(id) {
  const name = document.getElementById('edit-name')?.value.trim();
  const role = document.getElementById('edit-role')?.value.trim();
  const dept = document.getElementById('edit-dept')?.value.trim();
  if (!name) { alert('Name cannot be empty.'); return; }
  const idx = state.employees.findIndex(e=>e.id===id);
  if (idx > -1) state.employees[idx] = { ...state.employees[idx], name, role:role||'', dept:dept||'' };
  state.editingEmpId = null;
  render();
  if (dbOk) {
    showSaving('Saving…');
    try { await dbUpdateEmployee(state.employees[idx]); showSaving('Saved ✓', 1000); }
    catch(e) { console.error(e); saveLS(); showSaving('Save failed', 2000); }
  } else { saveLS(); }
}

async function confirmDelete(id) {
  if (state.selectedEmp === id) state.selectedEmp = null;
  state.employees = state.employees.filter(e=>e.id!==id);
  delete state.records[id];
  state.confirmDeleteId = null;
  render();
  if (dbOk) {
    showSaving('Deleting…');
    try { await dbDeleteEmployee(id); showSaving('Deleted ✓', 1000); }
    catch(e) { console.error(e); saveLS(); }
  } else { saveLS(); }
}

function clockOut(empId, date) { setR(empId, date, { clockOut: nowTime() }); }

function handleStatus(empId, date, sel) {
  const status = sel.value; if (!status) return;
  const existing = getR(empId, date); const update = { status };
  if ((status==='present'||status==='wfh') && !existing.clockIn) update.clockIn = nowTime();
  if (status==='absent'||status==='leave') { update.clockIn=null; update.clockOut=null; }
  setR(empId, date, update);
}

function saveClockTimes(empId, date) {
  const cin = document.getElementById('cin-inp')?.value;
  const cout = document.getElementById('cout-inp')?.value;
  setR(empId, date, { clockIn: cin||null, clockOut: cout||null });
}

async function addEmpPrompt() {

// ── Upload / CSV ──
function handleUpload(e) {
  const file = e.target.files[0]; if (!file) return;
  e.target.value = '';
  const reader = new FileReader();
  reader.onload = ev => {
    const lines = ev.target.result.split('\n').filter(l=>l.trim());
    const parsed = [];
    lines.forEach((line,i) => {
      if (i===0 && line.toLowerCase().includes('name')) return;
      const p = line.split(',').map(s=>s.trim().replace(/^"|"$/g,''));
      if (p[0]) parsed.push({ id:'e'+Date.now()+i, name:p[0], role:p[1]||'', dept:p[2]||'' });
    });
    if (parsed.length===0) { alert('No employees found. Format: Name, Role, Department'); return; }
    if (state.employees.length===0) { applyUpload(parsed, 'replace'); return; }
    state.uploadModal = { parsed, mode:'add' }; render();
  };
  reader.readAsText(file);
}
function setUploadMode(mode) { state.uploadModal = {...state.uploadModal, mode}; render(); }
function confirmUpload() { const {parsed,mode} = state.uploadModal; applyUpload(parsed, mode); }
function cancelUpload() { state.uploadModal=null; render(); }

async function applyUpload(parsed, mode) {
  if (mode === 'replace') {
    if (dbOk) {
      showSaving('Clearing…');
      try { await dbDeleteAllEmployees(); } catch(e) { console.error(e); }
    }
    state.employees = parsed;
    state.records = {};
    parsed.forEach(emp => { state.records[emp.id] = {}; });
    state.selectedEmp = null;
  } else {
    const existingNames = new Set(state.employees.map(e=>e.name.toLowerCase()));
    const newOnes = parsed.filter(e=>!existingNames.has(e.name.toLowerCase()));
    const skipped = parsed.length - newOnes.length;
    state.employees = [...state.employees, ...newOnes];
    newOnes.forEach(emp => { if (!state.records[emp.id]) state.records[emp.id] = {}; });
    if (skipped > 0) setTimeout(()=>alert(`${skipped} duplicate(s) skipped.`), 100);
    parsed.length && (parsed = newOnes);
  }
  state.uploadModal = null;
  render();
  if (dbOk) {
    showSaving('Syncing to database…');
    try {
      const toSync = mode==='replace' ? state.employees : parsed;
      if (toSync.length) await dbBulkUpsertEmployees(toSync);
      showSaving('Synced ✓', 1000);
    } catch(e) { console.error(e); saveLS(); showSaving('Sync failed', 2000); }
  } else { saveLS(); }
}

function dlDayXlsx() {
  const date = state.selectedDate;
  const rows = state.employees.map(emp => {
    const r=getR(emp.id,date); const h=dailyHrs(emp.id,date);
    return { Employee:emp.name, Role:emp.role, Department:emp.dept, Date:fmtDate(date), Status:r.status||'—', 'Clock In':r.clockIn||'—', 'Clock Out':r.clockOut||'—', 'Hours Worked':h>0?parseFloat(h.toFixed(2)):'' };
  });
  const ws=XLSX.utils.json_to_sheet(rows); ws['!cols']=[{wch:22},{wch:20},{wch:16},{wch:14},{wch:10},{wch:10},{wch:10},{wch:14}];
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Attendance');
  XLSX.writeFile(wb, `BluParrot_Attendance_${date}.xlsx`); closeDl();
}
function dlMonthXlsx() {
  const y=state.viewYear, m=state.viewMonth;
  const rows=[];
  state.employees.forEach(emp=>{
    const base=new Date(y,m,1);
    for(let i=0;i<31;i++){
      const d=new Date(base); d.setDate(i+1); if(d.getMonth()!==m)break;
      const ds=d.toISOString().slice(0,10); if(d.getDay()===0||d.getDay()===6)continue;
      const r=getR(emp.id,ds); const h=dailyHrs(emp.id,ds);
      rows.push({Employee:emp.name,Role:emp.role,Department:emp.dept,Date:fmtDate(ds),Day:d.toLocaleDateString('en-IN',{weekday:'short'}),Status:r.status||'—','Clock In':r.clockIn||'—','Clock Out':r.clockOut||'—','Hours Worked':h>0?parseFloat(h.toFixed(2)):''});
    }
  });
  const ws=XLSX.utils.json_to_sheet(rows); ws['!cols']=[{wch:22},{wch:20},{wch:16},{wch:14},{wch:8},{wch:10},{wch:10},{wch:10},{wch:14}];
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,fmtMonth(y,m));
  XLSX.writeFile(wb,`BluParrot_${y}-${String(m+1).padStart(2,'0')}.xlsx`); closeDl();
}
function dlEmpXlsx(empId) {
  const emp=state.employees.find(e=>e.id===empId); if(!emp)return;
  const y=state.viewYear, m=state.viewMonth; const base=new Date(y,m,1); const rows=[];
  for(let i=0;i<31;i++){
    const d=new Date(base); d.setDate(i+1); if(d.getMonth()!==m)break;
    const ds=d.toISOString().slice(0,10); if(d.getDay()===0||d.getDay()===6)continue;
    const r=getR(emp.id,ds); const h=dailyHrs(emp.id,ds);
    rows.push({Date:fmtDate(ds),Day:d.toLocaleDateString('en-IN',{weekday:'short'}),Status:r.status||'—','Clock In':r.clockIn||'—','Clock Out':r.clockOut||'—','Hours Worked':h>0?parseFloat(h.toFixed(2)):''});
  }
  const c=mCounts(empId,y,m); const mh=monthlyHrs(empId,y,m);
  rows.push({Date:'TOTAL',Day:'',Status:'','Clock In':'','Clock Out':'','Hours Worked':parseFloat(mh.toFixed(2))});
  const ws=XLSX.utils.json_to_sheet(rows); ws['!cols']=[{wch:16},{wch:8},{wch:10},{wch:10},{wch:10},{wch:14}];
  const infoWs=XLSX.utils.aoa_to_sheet([['Employee',emp.name],['Role',emp.role],['Department',emp.dept],['Month',fmtMonth(y,m)],['Present',c.present],['WFH',c.wfh],['Leave',c.leave],['Absent',c.absent],['Total Hours',parseFloat(mh.toFixed(2))]]);
  infoWs['!cols']=[{wch:16},{wch:22}];
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,infoWs,'Summary'); XLSX.utils.book_append_sheet(wb,ws,'Daily Log');
  XLSX.writeFile(wb,`BluParrot_${emp.name.replace(/ /g,'_')}_${y}-${String(m+1).padStart(2,'0')}.xlsx`);
}
function closeDl() { state.dlOpen=false; render(); }

}
